name: Sync CMS config

on:
  workflow_dispatch:
  # Uncomment to sync automatically when cms.config.json changes on main:
  # push:
  #   branches: [main]
  #   paths: [cms.config.json]

jobs:
  sync:
    name: Upload cms.config.json to Vercel Blob
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload config to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npm install --no-save @vercel/blob
          node -e "
            const { put } = require('@vercel/blob');
            const fs = require('fs');
            put('config/site.json', fs.readFileSync('cms.config.json'), {
              access: 'public',
              addRandomSuffix: false,
              allowOverwrite: true,
              contentType: 'application/json',
              token: process.env.BLOB_READ_WRITE_TOKEN,
            }).then(r => console.log('Uploaded:', r.url))
              .catch(e => { console.error(e.message); process.exit(1); });
          "
